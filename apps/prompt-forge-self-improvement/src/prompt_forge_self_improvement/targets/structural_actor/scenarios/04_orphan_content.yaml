name: orphan_content
description: |
  An h2 section "Output format details" sits as a sibling of the existing
  h2 "Output format" section, but its content clearly belongs inside that
  section. The structural actor should move 1.4 (or its body) inside 1.2.

  Tree IDs:
    1     = Section "Task" (h1)
    1.1   = Paragraph intro
    1.2   = Section "Output format" (h2)
    1.2.1 = Paragraph "Respond with a single word."
    1.3   = Section "Steps" (h2)
    1.3.1 = Paragraph step description
    1.4   = Section "Output format details" (h2)   ← orphan that belongs inside 1.2

prompt_markdown: |
  # Task

  Read a short story and answer a causal-judgement question.

  ## Output format

  Respond with a single word.

  ## Steps

  Identify the cause described in the story.

  ## Output format details

  The word must be exactly `Yes` or `No`, with no surrounding quotes,
  punctuation, or whitespace.

preserve:
  - "Keep the single-word Yes/No output instruction."

defects:
  - kind: orphan_content
    culprit_node_ids: ["1.4"]
    collateral_node_ids: ["1.2", "1.2.1"]
    description: |
      Section 1.4 "Output format details" elaborates on the topic owned by
      section 1.2 "Output format". Fix: move_node 1.4 inside 1.2 (or move
      1.4's children inside 1.2 and then delete 1.4). Collateral 1.2 is the
      destination; 1.2.1 may be the anchor if `inside` is unavailable.
