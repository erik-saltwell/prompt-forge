name: coverage_priority
description: |
  Two signals for node 2.1: one critical (seen in 8 cases) and one minor (seen in 1
  case). The critical issue MUST produce at least one action. The minor one may be
  skipped. Tests that the actor prioritizes by sightings count.

  Tree IDs:
    1    = Section "Task" (h1)
    1.1  = Paragraph "Answer causal-judgement questions about stories."
    2    = Section "Causal Rubric" (h1)
    2.1  = Paragraph "Use human causal judgment."
    3    = Section "Output Format" (h1)
    3.1  = Paragraph "Respond with Yes or No."

prompt_markdown: |
  # Task

  Answer causal-judgement questions about stories.

  # Causal Rubric

  Use human causal judgment.

  # Output Format

  Respond with Yes or No.

signals:
  - culprit_node_id: "2.1"
    rationale: "The rubric doesn't define what 'human causal judgment' means — the model has no framework to apply."
    target_behavior: "Name the specific factors: norm violation, intentionality, counterfactual necessity."
    success_criterion: "At least two specific causal factors are named in the rubric or its guidance."
    input_snippet: "Did the nurse's decision cause the patient's recovery?"
    output_snippet: "No"
    seen_in_n_cases: 8
  - culprit_node_id: "2.1"
    rationale: "The rubric should mention that the answer reflects majority human agreement, not a single person's view."
    target_behavior: "Clarify that the answer should be the majority view."
    success_criterion: "The rubric mentions 'majority' or 'most people'."
    input_snippet: "Did the bystander cause harm by not helping?"
    output_snippet: "Yes"
    seen_in_n_cases: 1

preserve: []

golden_actions:
  reasoning: "Address the critical rubric-definition issue (seen in 8 cases). The minor majority-view issue (seen in 1 case) is low priority and may be skipped."
  actions:
    - action: rewrite_node
      id: "2.1"
      text: "Apply human causal judgment by weighing norm violation, intentionality, and counterfactual necessity. Reflect the judgment most people would agree with."

criteria:
  id_validity:
    - "The id '2.1' exists in the prompt tree."
  host_type_correctness:
    - "No invalid annotation host types."
  issue_traceability:
    - "The action addresses the critical rubric-definition issue (seen in 8 cases)."
  action_type_fitness:
    - "rewrite_node or add_guidance is appropriate for a vague rubric."
  coverage:
    - "The critical issue (seen in 8 cases) produced at least one action."
    - "The minor issue (seen in 1 case) may or may not produce an action — either is acceptable."
  preserve_compliance:
    - "No preserve items to check."
  speculative_edit_absence:
    - "No actions on 1.1, 3.1, or nodes not in the feedback."
