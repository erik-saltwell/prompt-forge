name: id_nonexistent
description: |
  Feedback targets node 1.2.1 (a ListItem). The golden action uses only real IDs.
  A hallucinating actor might invent sibling IDs like "1.2.2" (doesn't exist) or
  target node "1.3" (doesn't exist). This scenario verifies the actor only emits
  IDs that appear verbatim in the input tree.

  Tree IDs:
    1        = Section "Task" (h1)
    1.1      = Paragraph "Answer causal-judgement questions about stories."
    1.2      = Section "Rules" (h2)
    1.2.1    = List (unordered)
    1.2.1.1  = ListItem "Respond with Yes or No only."
    1.2.1.2  = ListItem "Use majority human judgment as the causal standard."

prompt_markdown: |
  # Task

  Answer causal-judgement questions about stories.

  ## Rules

  - Respond with Yes or No only.
  - Use majority human judgment as the causal standard.

signals:
  - culprit_node_id: "1.2.1.2"
    rationale: "'Majority human judgment' is undefined — the model doesn't know how to apply it."
    target_behavior: "The causal standard should specify the factors humans consider: norm violation, intentionality, counterfactual necessity."
    success_criterion: "The list item names at least two of the three key factors (norm violation, intentionality, counterfactuals)."
    input_snippet: "Did the bystander cause harm by not intervening?"
    output_snippet: "Yes"
    seen_in_n_cases: 5

preserve:
  - "Keep the binary Yes/No output constraint in rule 1.2.1.1."

golden_actions:
  reasoning: "Rewrite the vague 'majority human judgment' rule to name the concrete factors."
  actions:
    - action: rewrite_node
      id: "1.2.1.2"
      text: "Use human causal judgment: weigh norm violation, intentionality, and counterfactual necessity."

criteria:
  id_validity:
    - "The id '1.2.1.2' exists in the tree; no invented IDs like '1.2.2', '1.3', or '2.1' appear."
    - "All action IDs match exactly what's in the <prompt> XML."
  host_type_correctness:
    - "No add_example or add_guidance actions are present (not needed here)."
  issue_traceability:
    - "The action rewrites or improves node 1.2.1.2, directly addressing the 'undefined judgment' signal."
  action_type_fitness:
    - "rewrite_node is correct when the existing text is vague and needs to be sharpened."
  coverage:
    - "The single high-sightings issue (seen in 5 cases) produced at least one action."
  preserve_compliance:
    - "Node 1.2.1.1 (the Yes/No constraint) is not touched."
  speculative_edit_absence:
    - "No actions on 1.1, 1.2, 1.2.1.1, or any node not in the feedback."
