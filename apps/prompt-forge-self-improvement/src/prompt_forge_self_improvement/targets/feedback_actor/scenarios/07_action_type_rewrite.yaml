name: action_type_rewrite
description: |
  The rubric paragraph is vague and undefined. The feedback says the node "is vague"
  and the target can't operationalize the instruction. The correct action is
  rewrite_node to sharpen the text. A naive actor might add_example instead, which
  doesn't fix the definitional vagueness.

  Tree IDs:
    1      = Section "Task" (h1)
    1.1    = Paragraph "Read a short story and answer the causal-judgement question."
    1.2    = Section "Causal Rubric" (h2)
    1.2.1  = Paragraph "Apply appropriate causal reasoning to each story."
    1.3    = Section "Output" (h2)
    1.3.1  = Paragraph "Respond with Yes or No."

prompt_markdown: |
  # Task

  Read a short story and answer the causal-judgement question.

  ## Causal Rubric

  Apply appropriate causal reasoning to each story.

  ## Output

  Respond with Yes or No.

signals:
  - culprit_node_id: "1.2.1"
    rationale: "'Appropriate causal reasoning' is undefined — the model cannot determine what 'appropriate' means and defaults to naive physical causation."
    target_behavior: "The rubric should explicitly define the factors to use: norm violation, intentionality, counterfactual necessity."
    success_criterion: "The rubric paragraph explicitly names at least two specific causal factors (norm violation, intentionality, counterfactuals)."
    input_snippet: "Was the politician's speech the cause of the riot?"
    output_snippet: "No"
    seen_in_n_cases: 11

preserve: []

golden_actions:
  reasoning: "Rewrite 1.2.1 to replace vague 'appropriate causal reasoning' with specific named factors."
  actions:
    - action: rewrite_node
      id: "1.2.1"
      text: "Apply human causal judgment by considering norm violation (did the agent break a rule?), intentionality (was the action deliberate?), and counterfactual necessity (would the outcome have occurred without this action?)."

criteria:
  id_validity:
    - "The id '1.2.1' exists in the prompt tree."
  host_type_correctness:
    - "No add_example or add_guidance actions (not needed for definitional vagueness)."
  issue_traceability:
    - "The action rewrites node 1.2.1 with concrete named factors, directly addressing the vagueness signal."
  action_type_fitness:
    - "rewrite_node is the correct choice when the existing text is fundamentally vague and needs to be replaced."
    - "add_example would not fix the core problem: the model needs a definition, not an instance."
  coverage:
    - "The single very-high-sightings issue (seen in 11 cases) produced at least one action."
  preserve_compliance:
    - "No preserve items to check (list is empty)."
  speculative_edit_absence:
    - "No actions on 1.1, 1.3.1, or other nodes not cited in the feedback."
