name: action_type_guidance
description: |
  The model systematically ignores norm violations — a recurring conceptual error,
  not confusion about a specific case. The feedback says the target "applies the
  wrong convention consistently." The correct action is add_guidance (state the rule
  explicitly). A naive actor might add_example instead, but examples alone won't fix
  a systematic convention error.

  Tree IDs:
    1      = Section "Task" (h1)
    1.1    = Paragraph "Read a short story and answer the causal-judgement question."
    1.2    = Section "Causal Rubric" (h2)
    1.2.1  = Paragraph "Use the judgment most humans would agree with based on the story."
    1.3    = Section "Output" (h2)
    1.3.1  = Paragraph "Respond with Yes or No."

prompt_markdown: |
  # Task

  Read a short story and answer the causal-judgement question.

  ## Causal Rubric

  Use the judgment most humans would agree with based on the story.

  ## Output

  Respond with Yes or No.

signals:
  - culprit_node_id: "1.2.1"
    rationale: "The model systematically under-weights norm violations. When an agent breaks a rule to cause an outcome, the model still answers 'No' — inconsistent with majority human judgment."
    target_behavior: "The model should apply the norm-violation convention: agents who break rules to produce outcomes are judged as stronger causes."
    success_criterion: "A guidance item explicitly states that norm violations increase causal attribution."
    input_snippet: "The driver ran a red light (violating traffic rules) and hit a pedestrian. Did the driver cause the injury?"
    output_snippet: "No"
    seen_in_n_cases: 10

preserve:
  - "Keep the rubric text in 1.2.1 unchanged — the general principle is correct."

golden_actions:
  reasoning: "Add a guidance rule about norm violations to 1.2.1 — this is a recurring convention error, not a case-specific confusion."
  actions:
    - action: add_guidance
      host_id: "1.2.1"
      text: "Give extra weight to norm violations: if the agent broke a rule, law, or social norm to produce the outcome, judge this as strongly causal — most people assign higher blame to norm-violating agents."

criteria:
  id_validity:
    - "The host_id '1.2.1' exists in the prompt tree."
  host_type_correctness:
    - "add_guidance host_id '1.2.1' is a Paragraph — valid."
  issue_traceability:
    - "The guidance rule directly addresses the norm-violation convention error described in the signal."
  action_type_fitness:
    - "add_guidance is the correct choice for a systematic convention error — state the rule explicitly."
    - "add_example alone would not fix a recurring conceptual error; a rule is needed."
  coverage:
    - "The single high-sightings issue (seen in 10 cases) produced at least one action."
  preserve_compliance:
    - "The rubric paragraph 1.2.1 text is not rewritten (preserved per the list)."
  speculative_edit_absence:
    - "No actions on 1.1, 1.3.1, or any node not cited in the feedback."
